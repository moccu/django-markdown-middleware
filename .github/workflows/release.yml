name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    name: "Upload to PyPI"
    runs-on: "ubuntu-latest"
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: "actions/checkout@v6"
      - uses: "astral-sh/setup-uv@v8.1.0"
      - name: "Build"
        run: "uv build"
      - name: "Publish to PyPI"
        run: "uv publish"
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
